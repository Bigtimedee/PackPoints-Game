name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type check · Unit tests · Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: packpoints_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/packpoints_test
      SESSION_SECRET: ci-test-session-secret-at-least-32-chars-long
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run check

      - name: Push database schema
        run: npx drizzle-kit push

      - name: Unit tests
        run: npx vitest run

      - name: Build
        run: npm run build

  e2e-stub:
    name: E2E (Playwright) — pending wiring
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "Playwright E2E not yet running in CI — see future prompt for live-server setup"
